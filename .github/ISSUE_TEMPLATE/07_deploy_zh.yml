name: 部署 / 配置求助
description: Docker 起不来、环境变量不知道怎么填、SQLite/PG 切换、deploy.sh 报错……
title: "[Deploy] "
labels: ["type/help", "area/deploy"]
body:
  - type: markdown
    attributes:
      value: |
        贴 docker-compose / env 时记得把 **密码、Token、API Key** 打码。

  - type: checkboxes
    id: prechecks
    attributes:
      label: 提交前我已确认
      options:
        - label: 我看过 [README](https://github.com/james-6-23/codex2api#documentation) 和 `docs/` 里的部署说明
          required: true
        - label: 我已经把贴出来的 docker-compose / env / 日志里的敏感信息打码
          required: true

  - type: dropdown
    id: shape
    attributes:
      label: 我用的部署形态？
      options:
        - Docker Compose（PostgreSQL + Redis）
        - Docker Compose（SQLite + Memory）
        - 源码直接运行
        - deploy.sh 脚本
        - Render / 其他云平台
        - 其他
    validations:
      required: true

  - type: textarea
    id: trouble
    attributes:
      label: 我卡在哪一步 / 报了什么错？
      description: 尽量贴上启动日志的报错段落，比凭印象描述准。
      placeholder: |
        例如：我执行 docker compose up 后，codex2api 容器一直重启，
        日志里反复出现 "failed to connect to redis"……
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: 我试过什么解决办法？（可选）
      placeholder: 比如我改过哪些环境变量、查过哪些文档。
