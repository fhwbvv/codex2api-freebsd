name: build-freebsd

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: build-freebsd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-freebsd:
    runs-on: ubuntu-latest
    env:
      BINARY_NAME: codex2api-freebsd-amd64
      VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build FreeBSD binary
        shell: bash
        run: |
          chmod +x scripts/package-freebsd.sh
          VERSION="${VERSION}" OUTPUT_NAME="${BINARY_NAME}" ./scripts/package-freebsd.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: dist/${{ env.BINARY_NAME }}
          if-no-files-found: error

      - name: Attach binary to tag release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/${{ env.BINARY_NAME }}
            config/serv00.sqlite.env.example
            docs/serv00-freebsd.md
            scripts/package-freebsd.sh
