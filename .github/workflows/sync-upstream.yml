name: sync-upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 6"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clone james-6-23 upstream
        shell: bash
        run: |
          rm -rf /tmp/upstream-codex2api
          git clone https://github.com/james-6-23/codex2api.git /tmp/upstream-codex2api

      - name: Sync upstream files while keeping FreeBSD automation
        shell: bash
        run: |
          rsync -a --delete /tmp/upstream-codex2api/ ./ \
            --exclude '.git/' \
            --exclude '.github/workflows/build-freebsd.yml' \
            --exclude '.github/workflows/sync-upstream.yml' \
            --exclude 'config/serv00.sqlite.env.example' \
            --exclude 'docs/serv00-freebsd.md' \
            --exclude 'scripts/package-freebsd.sh'

      - name: Commit synced changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No upstream changes to commit."
            exit 0
          fi
          git commit -m "chore: sync upstream"

      - name: Detect upstream release tag
        id: upstream_tag
        shell: bash
        run: |
          set -euo pipefail
          upstream_tag="$(git -C /tmp/upstream-codex2api tag --sort=-version:refname | head -n 1)"
          if [[ -z "$upstream_tag" ]]; then
            echo "No upstream tag found."
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "should_create=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$upstream_tag" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/$upstream_tag" >/dev/null; then
            echo "Upstream tag $upstream_tag already exists locally."
            echo "should_create=false" >> "$GITHUB_OUTPUT"
          else
            echo "New upstream tag detected: $upstream_tag"
            echo "should_create=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync commit
        shell: bash
        run: |
          git push origin HEAD:main

      - name: Create and push upstream release tag
        if: steps.upstream_tag.outputs.should_create == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git tag "${{ steps.upstream_tag.outputs.tag }}"
          git push origin "refs/tags/${{ steps.upstream_tag.outputs.tag }}"
