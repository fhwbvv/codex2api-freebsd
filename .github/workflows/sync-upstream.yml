name: sync-upstream

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clone james-6-23 upstream
        shell: bash
        run: |
          rm -rf /tmp/upstream-codex2api
          git clone --depth 1 https://github.com/james-6-23/codex2api.git /tmp/upstream-codex2api

      - name: Sync upstream files while keeping FreeBSD automation
        shell: bash
        run: |
          rsync -a --delete /tmp/upstream-codex2api/ ./ \
            --exclude '.git/' \
            --exclude '.github/workflows/build-freebsd.yml' \
            --exclude '.github/workflows/sync-upstream.yml' \
            --exclude 'config/serv00.sqlite.env.example' \
            --exclude 'docs/serv00-freebsd.md' \
            --exclude 'scripts/package-freebsd.sh'

      - name: Commit synced changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No upstream changes to commit."
            exit 0
          fi
          git commit -m "chore: sync upstream"

      - name: Push sync commit
        shell: bash
        run: |
          git push origin HEAD:main
